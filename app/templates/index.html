<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Chat</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <h1>AI Recipe Chat</h1>

        <div class="layout">
            <!-- Chat input form -->
            <form id="chat-form" novalidate>

                <!-- Persisted chat ID (shared with backend) -->
                <input type="hidden" id="chat-id" name="chat_id">

                <label for="message">Message</label>
                <textarea
                    id="message"
                    name="message"
                    class="message-input"
                    placeholder="Type your question here..."
                    required></textarea>

                <button type="submit">Send</button>
            </form>

            <!-- Chat message display area -->
            <section
                class="chat-window"
                aria-live="polite"
                aria-label="Conversation content">
                <div id="chat-log" class="chat-log"></div>
            </section>
        </div>
    </div>

    <script>
      const form = document.getElementById('chat-form');
      const chatLog = document.getElementById('chat-log');
      const submitButton = form.querySelector('button[type="submit"]');
      const chatIdField = document.getElementById('chat-id');
      const messageField = document.getElementById('message');

      // Display labels for each role
      const roleLabels = {
        user: 'You',
        assistant: 'AI Chef'
      };

      // ------------------------------------------------------------------
      // 1) Generate or load a persistent chatId (stored in localStorage)
      // ------------------------------------------------------------------
      function uuidv4() {
        if (crypto?.randomUUID) return crypto.randomUUID();

        // Fallback for older environments
        const buf = new Uint8Array(16);
        (crypto?.getRandomValues ?? function (b) {
          for (let i = 0; i < b.length; i++) {
            b[i] = Math.random() * 256 | 0;
          }
        })(buf);

        buf[6] = (buf[6] & 0x0f) | 0x40; // UUID version 4
        buf[8] = (buf[8] & 0x3f) | 0x80; // Variant

        const h = [...buf].map(b => b.toString(16).padStart(2, '0'));
        return `${h[0]}${h[1]}${h[2]}${h[3]}-${h[4]}${h[5]}-${h[6]}${h[7]}-${h[8]}${h[9]}-${h[10]}${h[11]}${h[12]}${h[13]}${h[14]}${h[15]}`;
      }

      function getOrCreateChatId() {
        const KEY = 'recipe_chat_id';
        let id = localStorage.getItem(KEY);
        if (!id) {
          id = uuidv4();
          localStorage.setItem(KEY, id);
        }
        return id;
      }

      const CHAT_ID = getOrCreateChatId();
      chatIdField.value = CHAT_ID; // Ensure backend receives the same chat_id

      // ------------------------------------------------------------------
      // 2) Rendering and message sending logic
      // ------------------------------------------------------------------
      function renderMultilineText(container, text) {
        container.innerHTML = '';
        const lines = (text ?? '').split(/\n+/);

        lines.forEach((line, index) => {
          if (index > 0) {
            container.appendChild(document.createElement('br'));
          }
          container.appendChild(document.createTextNode(line));
        });
      }

      function appendMessage(role, content, { pending = false, timestamp = new Date() } = {}) {
        const article = document.createElement('article');
        article.className = `message ${role}`;
        if (pending) article.classList.add('pending');

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        const meta = document.createElement('div');
        meta.className = 'meta';

        const roleEl = document.createElement('span');
        roleEl.className = 'role';
        roleEl.textContent = roleLabels[role] ?? role;

        const timeEl = document.createElement('time');
        timeEl.dateTime = timestamp.toISOString();
        timeEl.textContent = timestamp.toLocaleTimeString();

        meta.append(roleEl, timeEl);

        const contentEl = document.createElement('p');
        renderMultilineText(contentEl, content);

        bubble.append(meta, contentEl);
        article.append(bubble);
        chatLog.append(article);

        chatLog.scrollTop = chatLog.scrollHeight;
        return { article, contentEl };
      }

      // ------------------------------------------------------------------
      // 3) Form submit handler
      // ------------------------------------------------------------------
      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const message = messageField.value.trim();
        if (!message) return;

        const timestamp = new Date();
        appendMessage('user', message, { timestamp });

        const assistantMessage = appendMessage(
          'assistant',
          'Thinking...',
          { pending: true, timestamp }
        );

        submitButton.disabled = true;

        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              message
            })
          });

          if (!res.ok) {
            throw new Error(`Server returned status ${res.status}`);
          }

          const data = await res.json();
          assistantMessage.article.classList.remove('pending');
          renderMultilineText(assistantMessage.contentEl, data.response);

        } catch (error) {
          assistantMessage.article.classList.remove('pending');
          assistantMessage.article.classList.add('error');
          renderMultilineText(
            assistantMessage.contentEl,
            `Error: ${error.message}`
          );
        } finally {
          submitButton.disabled = false;
          messageField.value = '';
          messageField.focus();
        }
      });

      // ------------------------------------------------------------------
      // 4) Auto-resize textarea based on content
      // ------------------------------------------------------------------
      function autoResize(el) {
        // Reset height first to allow shrinking
        const style = window.getComputedStyle(el);
        const border =
          parseFloat(style.borderTopWidth) +
          parseFloat(style.borderBottomWidth);

        el.style.height = 'auto';
        const newHeight = Math.min(
          el.scrollHeight + border,
          parseFloat(style.maxHeight) || 9999
        );

        el.style.height =
          Math.max(newHeight, parseFloat(style.minHeight) || 0) + 'px';
      }

      messageField.addEventListener('input', () => autoResize(messageField));
      window.addEventListener('load', () => autoResize(messageField));
    </script>
</body>
</html>
